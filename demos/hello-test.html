<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Test — barcik.training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1a202c; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        header { background: #1e3a5f; color: #fff; width: 100%; padding: 1rem; text-align: center; font-size: 0.9rem; letter-spacing: 0.05em; position: fixed; top: 0; }
        main { text-align: center; margin-top: 4rem; }
        h1 { font-size: 2.2rem; color: #1e3a5f; margin-bottom: 1rem; }
        #timestamp { font-size: 1rem; color: #4a5568; margin-bottom: 2rem; }
        button { background: #1e3a5f; color: #fff; border: none; padding: 0.75rem 2rem; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2b5a8f; }
    </style>
</head>
<body>
    <header>barcik.training</header>
    <main>
        <h1>Barcik Training Demos</h1>
        <p id="timestamp"></p>
        <button onclick="alert('Pipeline works!')">Test Pipeline</button>
    </main>
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
