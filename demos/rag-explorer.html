// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function cosineSim(a, b) {
  let dot = 0, magA = 0, magB = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    magA += a[i] * a[i];
    magB += b[i] * b[i];
  }
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function valToColor(val, hue = 174) {
  const alpha = Math.max(0.08, val);
  if (hue === 174) return `rgba(30,58,95,${alpha})`;
  if (hue === 260) return `rgba(37,99,235,${alpha})`;
  if (hue === 28) return `rgba(217,119,6,${alpha})`;
  return `hsla(${hue},70%,60%,${alpha})`;
}

function renderVectorRow(label, vec, hue = 174) {
  const cells = vec.map((v, i) =>
    `<div class="vector-cell" style="background:${valToColor(v, hue)}" data-val="${DIM_LABELS[i]}: ${v.toFixed(2)}"></div>`
  ).join('');
  return `<div class="vector-row">
    <div class="vector-label">${label}</div>
    <div class="vector-bar-container">${cells}</div>
  </div>`;
}

function renderTicket(t, similarity = null, highlighted = false) {
  let simBadge = '';
  if (similarity !== null) {
    const pct = (similarity * 100).toFixed(1);
    const cls = similarity > 0.85 ? 'sim-high' : similarity > 0.65 ? 'sim-med' : 'sim-low';
    simBadge = `<div class="similarity-badge ${cls}">${pct}% match</div>`;
  }
  return `<div class="ticket ${highlighted ? 'highlighted' : ''}">
    ${simBadge}
    <div class="ticket-id">${t.id} · <span class="tag tag-teal">${t.category}</span></div>
    <div class="ticket-title">${t.title}</div>
    <div class="ticket-text">${t.text}</div>
    <div class="ticket-resolution">✓ ${t.resolution}</div>
  </div>`;
}

function approxTokens(text) {
  return Math.round(text.length / 4);
}

  }
];

      ① <strong>It simply doesn't fit.</strong> Real knowledge bases have thousands of documents. Even modern context windows overflow.<br>
      ② <strong>It's expensive.</strong> Every token costs money. Sending 100k tokens when you need info from 2 tickets wastes 99%+ of your budget.<br>

      <div class="flow-row">

      <p class="dim" style="font-size:0.85rem;">These vectors are stored in a specialized database (like Pinecone, Weaviate, or Chroma) that's optimized for one thing: quickly finding the most similar vectors to a given query vector. Think of it as a "meaning-based index."</p>
      <div class="flow-row">
        <div class="flow-box flow-orange">Raw ticket text</div>

// ---- STEP 3: MEAN POOLING ----
function renderStep3() {
  // Simulate word-level vectors for one ticket
  const wordVecs = [
    { word: "VPN",          vec: [0.95, 0.10, 0.02, 0.05, 0.80, 0.15, 0.30, 0.50] },
    { word: "disconnects",  vec: [0.70, 0.05, 0.03, 0.20, 0.60, 0.10, 0.90, 0.40] },
    { word: "every",        vec: [0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.10, 0.05] },
    { word: "30",           vec: [0.03, 0.03, 0.03, 0.03, 0.03, 0.03, 0.05, 0.03] },
    { word: "minutes",      vec: [0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.15, 0.10] },
    { word: "remote",       vec: [0.60, 0.10, 0.05, 0.05, 0.95, 0.20, 0.40, 0.35] },
    { word: "work",         vec: [0.20, 0.10, 0.10, 0.10, 0.85, 0.30, 0.20, 0.20] },
    { word: "Cisco",        vec: [0.80, 0.15, 0.05, 0.30, 0.50, 0.05, 0.20, 0.70] },
    { word: "AnyConnect",   vec: [0.90, 0.20, 0.05, 0.15, 0.70, 0.10, 0.30, 0.60] },
  ];

  // Calculate actual mean
  const meanVec = Array(8).fill(0);
  wordVecs.forEach(wv => wv.vec.forEach((v, i) => meanVec[i] += v));
  meanVec.forEach((v, i) => meanVec[i] = +(v / wordVecs.length).toFixed(2));

  const wordVecRows = wordVecs.map(wv =>
    `<div class="vector-row">
      <div class="vector-label" style="color:var(--accent3)">"${wv.word}"</div>
      <div class="vector-bar-container">${wv.vec.map((v,i) => `<div class="vector-cell" style="background:${valToColor(v, 28)}" data-val="${DIM_LABELS[i]}: ${v.toFixed(2)}"></div>`).join('')}</div>
    </div>`
  ).join('');

  return `
    <div class="step-header">
      <h2>Mean Pooling: From Words to Document Vectors</h2>
      <p>How does a sentence become a single vector? The key technique is <strong>mean pooling</strong> — averaging the vectors of all tokens.</p>
    </div>

    <div class="insight">
      <strong>The challenge:</strong> A transformer model processes text token by token, producing a vector for <em>each</em> token. But we need <em>one</em> vector to represent the whole document in our vector database. How do we collapse many vectors into one?
    </div>

    <div class="card">
      <h3>Token-level vectors for TKT-1042</h3>
      <p class="dim" style="font-size:0.85rem; margin-bottom:12px;">"VPN disconnects every 30 minutes during remote work. Cisco AnyConnect." — each word gets its own vector from the model:</p>

      <div style="display:flex; gap:4px; margin-bottom:8px; padding-left:98px;">
        ${DIM_LABELS.map(d => `<div style="flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--text-dim);">${d}</div>`).join('')}
      </div>
      ${wordVecRows}
    </div>

    <div class="card">
      <h3>Mean pooling: Average all vectors</h3>
      <p class="dim" style="font-size:0.85rem; margin-bottom:12px;">We simply <strong>average each dimension</strong> across all word vectors. This is "mean pooling" — it gives us a single vector that captures the overall meaning of the entire text:</p>

      <div style="display:flex; align-items:center; gap:16px; margin:20px 0;">
        <div style="flex:1;">
          <div style="font-size:0.75rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-align:center; margin-bottom:8px;">${wordVecs.length} word vectors</div>
          <div style="display:flex; flex-direction:column; gap:2px;">
            ${wordVecs.map(wv => `<div style="display:flex; gap:2px;">${wv.vec.map(v => `<div class="mini-cell" style="flex:1; background:${valToColor(v, 28)}"></div>`).join('')}</div>`).join('')}
          </div>
        </div>

        <div style="text-align:center; flex-shrink:0;">
          <div style="font-size:1.5rem; color:var(--accent);">→</div>
          <div style="font-size:0.65rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace;">mean()</div>
        </div>

        <div style="flex:0.5;">
          <div style="font-size:0.75rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace; text-align:center; margin-bottom:8px;">1 document vector</div>
          <div style="display:flex; gap:2px;">
            ${meanVec.map(v => `<div class="mini-cell" style="flex:1; height:${28 * wordVecs.length + (wordVecs.length-1)*2}px; background:${valToColor(v)}; border-radius:3px;"></div>`).join('')}
          </div>
        </div>
      </div>

      <div style="display:flex; gap:4px; padding-left:98px; margin-bottom:4px;">
        ${DIM_LABELS.map(d => `<div style="flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--text-dim);">${d}</div>`).join('')}
      </div>
      ${renderVectorRow('MEAN →', meanVec)}
    </div>

    <div class="insight">
      <strong>Why mean pooling works:</strong> Notice how "VPN," "Cisco," and "AnyConnect" all strongly activate the "network" dimension. Even after averaging with generic words like "every" and "30," the network signal dominates. The <em>meaningful</em> words contribute the most to the averaged vector because their values are strongest. Generic words contribute near-zero, naturally fading into noise. The result is a vector that "knows" this document is primarily about network/VPN/remote work issues.
    </div>

    <div class="card">
      <h3>Real vs. simplified</h3>
      <p class="dim" style="font-size:0.85rem;">In practice, embedding models like <code>text-embedding-3-small</code> use 1,536 dimensions (not 8), and the model uses learned attention to weigh which tokens matter most. But the principle is identical: collapse many token vectors into one document vector that captures the essential meaning. Some models also use the [CLS] token's output or weighted attention pooling, but mean pooling is the most common and intuitive.</p>
    </div>
  `;
}

// ---- STEP 4: SEMANTIC SEARCH ----
function renderStep4() {
  return `
    <div class="step-header">
      <h2>Semantic Search: Finding Relevant Tickets</h2>
      <p>Now the magic happens. A user asks a question, we embed it, and search for the most similar ticket vectors.</p>
    </div>

    <div class="card">
      <h3>Try a query</h3>
      <p class="dim" style="font-size:0.85rem; margin-bottom:12px;">Select a support question to see how semantic search finds the most relevant tickets:</p>

      <select class="query-input" id="querySelect" onchange="runSearch()">
        <option value="">— Choose a customer query —</option>
        <option value="vpn-drop">🔌 "My VPN keeps disconnecting while I'm working from home"</option>
        <option value="password-issue">🔑 "I changed my password and now I can't access anything"</option>
        <option value="printer-not-working">🖨️ "I moved desks and now my printer doesn't work"</option>
      </select>
    </div>

    <div id="searchResults"></div>
  `;
}

function runSearch() {
  const sel = document.getElementById('querySelect').value;
  const container = document.getElementById('searchResults');
  if (!sel) { container.innerHTML = ''; return; }

  const query = QUERIES[sel];
  const queryVec = query.embedding;

  // Calculate similarities
  const sims = TICKETS.map(t => ({
    ticket: t,
    sim: cosineSim(queryVec, EMBEDDINGS[t.id])
  })).sort((a, b) => b.sim - a.sim);

  const topK = 2;

  container.innerHTML = `
    <div class="card mt-16">
      <h3>Query embedding</h3>
      <p class="dim" style="font-size:0.82rem; margin-bottom:8px;">"${query.text}"</p>
      <div style="display:flex; gap:4px; padding-left:98px; margin-bottom:4px;">
        ${DIM_LABELS.map(d => `<div style="flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--text-dim);">${d}</div>`).join('')}
      </div>
      ${renderVectorRow('QUERY', queryVec, 28)}
    </div>

    <div class="card">
      <h3>Cosine similarity ranking</h3>
      <p class="dim" style="font-size:0.82rem; margin-bottom:12px;">We compare the query vector against every ticket vector using cosine similarity. The top ${topK} matches are retrieved:</p>
      ${sims.map((s, i) => renderTicket(s.ticket, s.sim, i < topK)).join('')}
    </div>

    <div class="insight">
      <strong>Notice:</strong> The search found relevant tickets based on <em>meaning</em>, not keyword matching. The query "${query.text}" doesn't need to contain the exact words from the tickets. "Disconnecting" matches "disconnects" and "slow" — because semantically they describe similar VPN problems. This is the power of semantic search over traditional keyword search.
    </div>
  `;
}

function showAugmented() {

  })).sort((a, b) => b.sim - a.sim);
  const top2 = sims.slice(0, 2);

  const systemText = "You are an IT support assistant. Use the provided context from historical tickets to help the user. If the context doesn't contain relevant info, say so.";
  const ragText = top2.map(s =>
    `[${s.ticket.id}] ${s.ticket.title}\nProblem: ${s.ticket.text}\nResolution: ${s.ticket.resolution}`
  ).join('\n\n');
  const queryText = query.text;

  const allTicketsTokens = approxTokens(TICKETS.map(t => t.text + t.resolution).join(' '));
  const ragTokens = approxTokens(ragText);

  container.innerHTML = `
    <div class="context-window mt-16">
      <div class="ctx-section ctx-system">
        <div class="ctx-label">System Prompt</div>
        <div style="font-size:0.82rem;">${systemText}</div>
      </div>
      <div class="ctx-section ctx-rag">
        <div class="ctx-label">Retrieved Context (RAG) <span class="tag tag-teal" style="margin-left:8px;">${ragTokens} tokens</span></div>

      </div>
      <div class="ctx-section ctx-query">
        <div class="ctx-label">User Query</div>
        <div style="font-size:0.82rem;">${queryText}</div>
      </div>
    </div>

    <div class="card">
      <h3>Token budget comparison</h3>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:4px;">
          <span class="mono">❌ Naïve: all ${TICKETS.length} tickets</span>
          <span class="mono" style="color:var(--danger)">~${allTicketsTokens} tokens</span>
        </div>
        <div class="size-bar" style="background:var(--surface2)">
          <div class="size-fill" style="width:100%; background:var(--danger);">${allTicketsTokens}</div>
        </div>
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:4px;">
          <span class="mono">✅ RAG: top 2 relevant tickets</span>
          <span class="mono" style="color:var(--success)">~${ragTokens} tokens</span>
        </div>
        <div class="size-bar" style="background:var(--surface2)">
          <div class="size-fill" style="width:${(ragTokens/allTicketsTokens*100).toFixed(0)}%; background:var(--success);">${ragTokens}</div>
        </div>
      </div>
      <p class="dim mt-8" style="font-size:0.82rem;">RAG uses <strong>${(ragTokens/allTicketsTokens*100).toFixed(0)}%</strong> of the tokens while delivering <em>more</em> relevant context. With 1,000 tickets, the savings would be ~99.5%.</p>
    </div>

    <div class="insight">
      <strong>This is the key insight of RAG:</strong> The LLM sees only the 2 most relevant tickets, not all 8 (or 8,000). It can now focus entirely on the relevant context to generate a precise, grounded answer. Less noise, more signal, lower cost.
    </div>
  `;
}

  })).sort((a, b) => b.sim - a.sim);

  // Stage 3: Augment
  demoTimers.push(setTimeout(() => {
    document.getElementById('d-a').style.opacity = '1';
    stages.innerHTML += `
      <div class="card" style="animation: fadeIn 0.4s ease;">
        <h3>③ Prompt augmented with retrieved context</h3>
        <p class="dim" style="font-size:0.82rem;">System prompt + 2 relevant tickets + user query → sent to LLM</p>
      </div>
    `;
  }, 1800));

  // Stage 4: Generate
  demoTimers.push(setTimeout(() => {
    document.getElementById('d-g').style.opacity = '1';
    stages.innerHTML += `
      <div class="card" style="animation: fadeIn 0.4s ease;">
        <h3>④ LLM Response (grounded in retrieved context)</h3>
        <div class="response-area" id="demoResponse"><span class="typing">▌</span></div>
      </div>
    `;

    // Typewriter effect
    const responseEl = document.getElementById('demoResponse');
    const text = query.response;
    let idx = 0;
    const typeSpeed = 8;
    let builtHtml = '';
    function typeChar() {
      if (idx < text.length) {
        let chunk = text[idx];
        if (text.slice(idx, idx + 2) === '**') {
          const end = text.indexOf('**', idx + 2);
          if (end !== -1) {
            chunk = '<strong>' + text.substring(idx+2, end) + '</strong>';
            idx = end + 2;
          } else {
            idx++;
          }
        } else if (text[idx] === '\n') {
          chunk = '<br>';
          idx++;
        } else {
          idx++;
        }
        builtHtml += chunk;
        responseEl.innerHTML = builtHtml + '<span class="typing">▌</span>';
        demoTimers.push(setTimeout(typeChar, typeSpeed));
      } else {
        responseEl.innerHTML = builtHtml;
      }
    }
    typeChar();
  }, 2600));
}

// ============================================================
// NAVIGATION
// ============================================================
let currentStep = 0;

function renderNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) =>
    `<button class="step-btn ${i === currentStep ? 'active' : ''}" onclick="goToStep(${i})">
      <span class="step-num">${i + 1}</span>${s.label}
    </button>`
  ).join('');
}

function renderCurrentStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = `<div class="step-panel active">${STEPS[currentStep].render()}</div>`;
}

function goToStep(n) {
  currentStep = n;
  renderNav();
  renderCurrentStep();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

// Initial render
renderNav();
renderCurrentStep();
</script>
